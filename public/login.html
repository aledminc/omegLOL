<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>omegLOL — log in</title>
<link rel="stylesheet" href="/css/base.css" />
<style>
  /* Full-height, dead-centered sign-in — the card is the focal point of the page. */
  body { display: flex; flex-direction: column; min-height: 100vh; }
  .auth-wrap {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 16px 64px;
  }
  .auth-card { width: 100%; max-width: 400px; }
  .auth-card h1 { text-align: center; font-size: 25px; }
  .auth-card > .muted { text-align: center; margin-bottom: 18px; }

  .login-cam {
    width: 96px; height: 66px; margin: 4px auto 16px;
    border: 4px solid #2A3B52; border-radius: 10px;
    background: radial-gradient(circle at 35% 35%, #4DF3FF55 0%, transparent 55%), #0B1622;
    box-shadow: inset 0 0 0 2px #1E2A38, 0 4px 0 #1E2A38, 0 0 22px rgba(77,243,255,.35);
    position: relative; display: grid; place-items: center;
  }
  .login-cam::after {
    content: ""; width: 15px; height: 15px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff 0 12%, #6EFF8E 13% 55%, #1E2A38 56% 100%);
    box-shadow: 0 0 8px #6EFF8E;
  }

  /* informational / error banner — reused for both notices and validation errors */
  .auth-msg {
    margin: 0 0 14px; padding: 9px 11px;
    font-size: 13px; font-weight: 600; line-height: 1.4;
    color: #7A2E12; background: #FFE9D6;
    border: 1px solid var(--warn); border-radius: 8px;
    box-shadow: var(--bevel-in);
  }
  .panel .btn { margin-top: 4px; }
  .auth-switch { margin: 14px 0 0; text-align: center; font-size: 13px; }
  .guest-link { margin: 18px 0 0; text-align: center; }

  /* Continue with Google — white ghost button + the real multicolor G mark */
  .gbtn { width: 100%; margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .gbtn .gmark { flex: none; display: block; }
  .gbtn[hidden] { display: none; }
  /* "or" divider between social + email sign-in */
  .or-div { display: flex; align-items: center; gap: 10px; margin: 14px 0;
    color: var(--dim); font-family: "VT323", monospace; font-size: 16px; letter-spacing: .06em; }
  .or-div::before, .or-div::after { content: ""; flex: 1; height: 1px; background: var(--line-2); }
  .or-div[hidden] { display: none; }
</style>
</head>
<body>
<header id="site-nav"></header>
<main class="auth-wrap">
  <div class="auth-card">
    <div class="login-cam" aria-hidden="true"></div>
    <h1>Log in</h1>
    <p class="muted">Sign in to keep your rank across devices.</p>

    <div class="panel">
      <p id="msg" class="auth-msg" hidden></p>

      <button class="btn ghost gbtn" id="googleBtn" type="button">
        <svg class="gmark" viewBox="0 0 48 48" width="18" height="18" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.28-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>
      <div class="or-div" id="orDiv"><span>or</span></div>

      <form id="authForm" novalidate>
        <label>Email
          <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
        </label>
        <label>Password
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
        </label>
        <button class="btn" id="submitBtn" type="submit" style="width:100%">Sign in</button>
      </form>
      <p class="auth-switch muted">
        <span id="switchText">New here?</span>
        <a href="#" id="switchLink">Create an account</a>
      </p>
    </div>

    <p class="guest-link"><a href="/play">Continue as guest →</a></p>
  </div>
</main>

<script>
  const $ = id => document.getElementById(id);
  const AUTH = "/api/auth";
  let mode = "signin";                       // "signin" | "signup"
  let disabled = false;                      // true when the server has no auth configured

  const msg = $("msg");
  function note(text) { msg.textContent = text || ""; msg.hidden = !text; }

  function setMode(m) {
    mode = m;
    $("submitBtn").textContent = m === "signin" ? "Sign in" : "Create account";
    $("switchText").textContent = m === "signin" ? "New here?" : "Already have an account?";
    $("switchLink").textContent = m === "signin" ? "Create an account" : "Sign in";
    $("password").setAttribute("autocomplete", m === "signin" ? "current-password" : "new-password");
    note("");
  }
  $("switchLink").addEventListener("click", e => {
    e.preventDefault();
    if (disabled) return;
    setMode(mode === "signin" ? "signup" : "signin");
  });

  async function post(path, body) {
    const r = await fetch(AUTH + path, {
      method: "POST",
      headers: { "content-type": "application/json" },
      credentials: "same-origin",
      body: JSON.stringify(body),
    });
    let data = null; try { data = await r.json(); } catch {}
    return { ok: r.ok, status: r.status, data };
  }

  // Turn better-auth's raw error into something a human wants to read.
  function friendly(res) {
    const m = (res.data && (res.data.message || res.data.error)) || "";
    const code = (res.data && res.data.code) || "";
    if (/exist/i.test(m) || /USER_ALREADY_EXISTS/i.test(code))
      return "That email is already registered — try signing in instead.";
    if (/(short|weak|least|8)/i.test(m) && /password/i.test(m))
      return "Password is too short — use at least 8 characters.";
    if (res.status === 401 || /invalid|incorrect|credential/i.test(m))
      return "Wrong email or password.";
    return m || "Something went wrong — please try again.";
  }

  $("authForm").addEventListener("submit", async e => {
    e.preventDefault();
    if (disabled) return;
    note("");
    const email = $("email").value.trim();
    const password = $("password").value;
    if (!email || !password) { note("Enter your email and password."); return; }
    if (mode === "signup" && password.length < 8) { note("Password is too short — use at least 8 characters."); return; }

    const btn = $("submitBtn");
    btn.disabled = true;
    try {
      let res;
      if (mode === "signup") {
        // better-auth requires a name; the in-game screenname is chosen later at the name gate.
        const name = (email.split("@")[0] || "player").slice(0, 24);
        res = await post("/sign-up/email", { email, password, name });
      } else {
        res = await post("/sign-in/email", { email, password });
      }
      if (res.ok) { location.href = "/play"; return; }
      note(friendly(res));
    } catch {
      note("Network error — is the server running?");
    } finally {
      btn.disabled = false;
    }
  });

  // Continue with Google: ask better-auth for the OAuth URL, then hand off to Google's consent
  // screen. After consent, Google returns to /api/auth/callback/google, better-auth sets the
  // session cookie and redirects to callbackURL (/play). Same session cookie the game reads.
  $("googleBtn").addEventListener("click", async () => {
    if (disabled) return;
    note("");
    const btn = $("googleBtn");
    btn.disabled = true;
    try {
      const res = await post("/sign-in/social", { provider: "google", callbackURL: location.origin + "/play" });
      const url = res.data && (res.data.url || res.data.redirect);
      if (res.ok && url) { location.href = url; return; }
      note(friendly(res) || "Couldn't start Google sign-in — try again.");
    } catch {
      note("Network error — is the server running?");
    } finally {
      btn.disabled = false;
    }
  });

  function markUnavailable() {
    disabled = true;
    note("Account sign-in isn't enabled on this server yet — jump in as a guest below.");
    $("email").disabled = true;
    $("password").disabled = true;
    $("submitBtn").disabled = true;
    $("googleBtn").hidden = true;
    $("orDiv").hidden = true;
    $("switchLink").style.pointerEvents = "none";
    $("switchLink").style.opacity = ".5";
  }

  // On load: if auth isn't configured, degrade gracefully; if already signed in, skip to play.
  (async () => {
    try {
      const r = await fetch(AUTH + "/get-session", { credentials: "same-origin" });
      if (r.status === 404) { markUnavailable(); return; }
      const s = await r.json().catch(() => null);
      if (s && s.user) { location.href = "/play"; return; }
    } catch { /* leave the form usable; a real submit will surface any error */ }
  })();
</script>
<script src="/js/nav.js"></script>
</body>
</html>
