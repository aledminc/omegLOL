<style>
  /* Solo hero: logo + CTAs centered on the dark stage. Shell + spotlight glow from base.css (.crt). */
  .hero-wrap { max-width: 920px; }
  .hero-solo { text-align: center; padding: clamp(56px, 9vw, 108px) var(--s5) clamp(40px, 6vw, 60px); }
  .hero-solo .hero-logo { margin: 0 0 var(--s3); font-size: clamp(3.5rem, 10vw, 6.8rem); }
  .hero-solo .hero-tag { margin-bottom: var(--s6); font-size: clamp(1.05rem, 1.6vw, 1.25rem); }

  /* the LOL letters are alive: a gentle staggered bounce, transform-only */
  .hero-logo .lol span { display: inline-block; }
  @media (prefers-reduced-motion: no-preference) {
    .hero-logo .lol span { animation: lolBounce 1.8s var(--ease) infinite; }
    .hero-logo .lol span:nth-child(1) { animation-delay: 0s; }
    .hero-logo .lol span:nth-child(2) { animation-delay: 0.12s; }
    .hero-logo .lol span:nth-child(3) { animation-delay: 0.24s; }
  }
  @keyframes lolBounce {
    0%, 55%, 100% { transform: translateY(0) rotate(0); }
    20%           { transform: translateY(-0.08em) rotate(-3deg) scale(1.04); }
    38%           { transform: translateY(0.02em) rotate(2deg); }
  }

  .hero-cta.stacked { flex-direction: column; align-items: stretch; gap: var(--s3); max-width: 380px; margin: 0 auto; }
  .cta-row { display: flex; gap: var(--s3); }
  .cta-row .btn { flex: 1; text-align: center; }

  /* the one gold element on this page */
  .play-big {
    min-height: 56px;
    font-size: 1.125rem;
    letter-spacing: 0.01em;
    position: relative;
  }
  /* single soft gold pulse when the CTA lands (transform/opacity only) */
  .play-big::after {
    content: ""; position: absolute; inset: -2px;
    border: 2px solid var(--gold);
    border-radius: inherit;
    opacity: 0;
    pointer-events: none;
  }

  /* age note + social icon buttons: two columns mirroring the CTA row above */
  .hero-social { display: flex; align-items: center; gap: var(--s3); margin-top: var(--s2); }
  .age-note {
    flex: 1; text-align: center;
    font-size: 0.75rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-3); white-space: nowrap;
  }
  .soc-icons { flex: 1; display: flex; justify-content: center; gap: var(--s2); }
  .soc-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text-2);
    transition: transform var(--t-fast) var(--ease), background var(--t-fast) var(--ease),
                color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  }
  .soc-btn:hover { transform: translateY(-1px); color: var(--text); background: var(--gold-dim); border-color: var(--border-2); }
  .soc-btn:active { transform: translateY(0); }

  /* page-load sequence: nav -> headline -> tag -> CTA pops last. One pass, < 900ms. */
  @media (prefers-reduced-motion: no-preference) {
    #site-nav { animation: fadeIn 250ms var(--ease) both; }
    .hero-solo .hero-logo { animation: riseIn 350ms var(--ease) 100ms both; }
    .hero-solo .hero-tag  { animation: riseIn 350ms var(--ease) 180ms both; }
    .hero-cta > *         { animation: riseIn 300ms var(--ease) 280ms both; }
    .hero-cta .play-big   { animation: ctaIn 300ms var(--ease) 360ms both; }
    .play-big::after      { animation: goldPulse 320ms var(--ease) 560ms both; }
  }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes riseIn  { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ctaIn   { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes goldPulse { 0% { opacity: 0.7; transform: scale(1); } 100% { opacity: 0; transform: scale(1.08); } }
</style>
