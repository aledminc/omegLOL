<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login: omegLOL</title>
<link rel="icon" href="/favicons/favicon.ico" sizes="any" />
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/base.css" />
<style>
  /* Step 1 of the post-login consent flow. Mirrors the login page's centered card, with a tall
     scroll region holding the full Terms + Privacy — the "I agree" button unlocks only at the end. */
  body { display: flex; flex-direction: column; min-height: 100vh; }
  .auth-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--s6) var(--s4) var(--s7); }
  .agree-card { width: 100%; max-width: 660px; }
  .agree-card h1 { text-align: center; font-size: 1.5rem; }
  .agree-card > .muted { text-align: center; margin-bottom: var(--s4); }

  /* small camera mark: dark tile + gold live dot (same as /login) */
  .login-cam {
    width: 88px; height: 60px; margin: var(--s1) auto var(--s4);
    border: 1px solid var(--border-2); border-radius: var(--r-md);
    background: var(--cam);
    position: relative; display: grid; place-items: center;
  }
  .login-cam::after {
    content: ""; width: 10px; height: 10px; border-radius: 50%;
    background: var(--gold);
  }

  .doc-wrap { padding: 6px; }
  .doc-scroll { max-height: 56vh; overflow-y: auto; padding: var(--s4) 18px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--r-sm); }
  /* legal typography for the injected Terms/Privacy content (kept in step with those pages) */
  .doc-scroll h1 { font-size: 1.125rem; }
  .doc-scroll h2 { font-size: 0.75rem; font-weight: 500; line-height: 1.6;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--gold); margin: 26px 0 10px; padding-top: var(--s4); border-top: 1px solid var(--border); }
  .doc-scroll h2:first-of-type { margin-top: 2px; padding-top: 0; border-top: 0; }
  .doc-scroll p { margin: 0 0 11px; }
  .doc-scroll .doc-meta { font-family: var(--font-mono); font-size: 0.8125rem; color: var(--text-2); margin: -4px 0 var(--s4); }
  .doc-scroll .cl { font-weight: 600; color: var(--text); margin-right: 5px; }
  .doc-scroll .sub { font-weight: 600; margin: 4px 0 6px; }
  .doc-scroll ul { margin: 0 0 12px; padding-left: 20px; }
  .doc-scroll li { margin: 0 0 6px; }
  .doc-sep { margin: 30px 0; border: 0; border-top: 1px solid var(--border-2); }

  .scroll-hint { text-align: center; font-size: 0.875rem; color: var(--text-2); margin: var(--s3) 0 10px; }
  .scroll-hint.done { color: var(--gold); }
  #agreeBtn { width: 100%; }
  #agreeBtn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>
<header id="site-nav"></header>
<main class="auth-wrap">
  <div class="agree-card">
    <div class="login-cam" aria-hidden="true"></div>
    <h1>Review &amp; agree</h1>
    <p class="muted">Please read the Terms of Service and Privacy Policy in full. Scroll to the bottom to continue.</p>

    <div class="panel doc-wrap">
      <div class="doc-scroll" id="docScroll" tabindex="0">
        <p class="muted" id="docLoading">Loading the Terms of Service and Privacy Policy…</p>
      </div>
    </div>

    <p class="scroll-hint" id="scrollHint">↓ scroll to the end of both documents to continue</p>
    <button class="btn gold" id="agreeBtn" disabled>I have read and agree to the Terms of Service and Privacy Policy</button>
  </div>
</main>

<script>
  const $ = id => document.getElementById(id);
  const docScroll = $("docScroll"), agreeBtn = $("agreeBtn"), scrollHint = $("scrollHint");
  let unlocked = false;

  // Fetch a legal page and return its <main> content (same-origin, trusted static text; scripts
  // stripped defensively). Keeps this page in step with /terms and /privacy — no duplicated text.
  async function loadDoc(url) {
    const res = await fetch(url, { credentials: "same-origin" });
    if (!res.ok) throw new Error(url + " " + res.status);
    const doc = new DOMParser().parseFromString(await res.text(), "text/html");
    const main = doc.querySelector("main");
    if (!main) throw new Error("no main in " + url);
    main.querySelectorAll("script, header, footer, #site-nav").forEach(n => n.remove());
    return main.innerHTML;
  }

  function unlock() {
    if (unlocked) return;
    unlocked = true;
    agreeBtn.disabled = false;
    scrollHint.textContent = "✓ you've reached the end — you can continue";
    scrollHint.classList.add("done");
  }
  function checkScroll() {
    if (docScroll.scrollTop + docScroll.clientHeight >= docScroll.scrollHeight - 8) unlock();
  }
  docScroll.addEventListener("scroll", checkScroll);

  (async () => {
    try {
      const [tos, priv] = await Promise.all([loadDoc("/terms"), loadDoc("/privacy")]);
      docScroll.innerHTML = tos + '<hr class="doc-sep" />' + priv;
      // if the content is short enough that there's nothing to scroll, unlock right away
      requestAnimationFrame(checkScroll);
    } catch {
      docScroll.innerHTML = '<p class="muted">Couldn\'t load the documents here. Please open the ' +
        '<a href="/terms" target="_blank" rel="noopener">Terms of Service</a> and ' +
        '<a href="/privacy" target="_blank" rel="noopener">Privacy Policy</a>, then reload this page.</p>';
    }
  })();

  agreeBtn.addEventListener("click", () => {
    if (agreeBtn.disabled) return;
    try { sessionStorage.setItem("omeglol_tos_ok", "1"); } catch {}
    location.href = "/age";
  });
</script>
<script src="/js/nav.js"></script>
</body>
</html>
