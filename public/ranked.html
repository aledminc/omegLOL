<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>omegLOL | Ranked</title>
<link rel="icon" href="/favicons/favicon.ico" sizes="any" />
<script>/* pre-paint theme: dark default, light if opted in (set in /play settings) */try{if(localStorage.getItem("omeglol_theme")==="light")document.documentElement.setAttribute("data-theme","light")}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/base.css" />
<style>
  /* Page-specific ranked layouts; colors and typography stay on the shared omegLOL tokens. */
  .ranked-page { max-width:1040px; }
  .page-head { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .page-head h1 { margin-bottom:0; }
  .toggle { display:inline-flex; border-radius:var(--r-sm); padding:3px; margin:14px 0 20px; }
  .seg { padding:8px 16px; border:0; background:transparent; font:inherit; font-weight:500; border-radius:6px; cursor:pointer; }
  #viewRank { max-width:760px; }

  .rankhead { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .rankname { font-size:1.625rem; }
  .info { width:23px; height:23px; border-radius:50%; font-style:italic; font-weight:600; font-size:13px; line-height:1; cursor:pointer; }

  .sec-label { margin:22px 0 6px; }
  .match { display:flex; align-items:center; gap:10px; padding:9px 0; font-size:14px; }
  .match:last-child { border-bottom:0 !important; }
  .res { width:24px; height:24px; border-radius:6px; display:grid; place-items:center; font-weight:600; font-size:12px; }
  .opp { flex:1; } .elo { font-variant-numeric:tabular-nums; }

  .leaderboard { padding:0; overflow:hidden; }
  .leaderboard-head { display:flex; align-items:flex-start; justify-content:space-between; gap:24px; padding:22px 24px 18px; }
  .leaderboard-head h2 { margin:0; font-size:2rem; font-weight:700; letter-spacing:0; }
  .leaderboard-head p { margin:5px 0 0; color:var(--text-2); font-size:.875rem; }
  .board-scope { flex:none; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .scope-toggle { display:flex; align-items:center; gap:9px; min-height:38px; padding:6px 8px 6px 11px;
    color:var(--text-2); background:var(--surface-2); border:1px solid var(--border); border-radius:8px;
    font:500 .8125rem var(--font-body); cursor:pointer;
    transition:color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease); }
  .scope-toggle:hover { color:var(--text); border-color:var(--border-2); }
  .scope-toggle:disabled { cursor:wait; opacity:.65; }
  .scope-toggle svg { width:17px; height:17px; }
  .scope-switch { position:relative; width:34px; height:20px; background:var(--bg); border:1px solid var(--border-2); border-radius:10px; }
  .scope-switch::after { content:""; position:absolute; top:3px; left:3px; width:12px; height:12px;
    background:var(--text-3); border-radius:50%; transition:transform var(--t-mid) var(--ease), background var(--t-mid) var(--ease); }
  .scope-toggle[aria-checked="true"] { color:var(--text); border-color:var(--gold); background:var(--gold-dim); }
  .scope-toggle[aria-checked="true"] .scope-switch { border-color:var(--gold); }
  .scope-toggle[aria-checked="true"] .scope-switch::after { transform:translateX(14px); background:var(--gold); }
  .scope-message { min-height:17px; max-width:280px; color:var(--lose); font-size:.75rem; line-height:1.35; text-align:right; }

  .podium { list-style:none; margin:0; padding:28px 24px 0; display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr)); grid-template-areas:"second first third";
    gap:12px; align-items:end; background:var(--bg); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
  .podium-entry { --medal:var(--gold); min-width:0; display:flex; flex-direction:column; }
  .podium-entry.place-1 { --medal:var(--gold); grid-area:first; }
  .podium-entry.place-2 { --medal:#B9C2C9; grid-area:second; }
  .podium-entry.place-3 { --medal:#C9824A; grid-area:third; }
  .podium-player { position:relative; min-height:172px; display:flex; flex-direction:column; align-items:center;
    justify-content:flex-end; padding:18px 14px 16px; text-align:center; background:var(--surface);
    border:1px solid var(--border); border-bottom:0; border-top:3px solid var(--medal); border-radius:8px 8px 0 0; }
  .place-1 .podium-player { min-height:218px; }
  .place-2 .podium-player { min-height:190px; }
  .podium-rank { position:absolute; top:10px; left:12px; color:var(--medal);
    font-family:var(--font-mono); font-size:.75rem; font-variant-numeric:tabular-nums; }
  .podium-monogram { width:54px; height:54px; display:grid; place-items:center; margin-bottom:10px;
    border:1px solid var(--medal); border-radius:50%; color:var(--medal); background:var(--surface-2);
    font-family:var(--font-display); font-size:1.375rem; font-weight:700; }
  .place-1 .podium-monogram { width:64px; height:64px; font-size:1.625rem; }
  .podium-name { max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:var(--text); font-family:var(--font-display); font-size:1.0625rem; letter-spacing:0; }
  .place-1 .podium-name { font-size:1.25rem; }
  .you-tag { flex:none; padding:1px 5px; color:var(--gold); background:var(--gold-dim); border:1px solid var(--gold-glow);
    border-radius:4px; font-family:var(--font-body); font-size:.5625rem; font-weight:600; line-height:1.4; text-transform:uppercase; }
  .podium-player > .you-tag { margin-top:4px; }
  .podium-tier { max-width:100%; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:var(--tier); font-size:.75rem; font-weight:600; }
  .podium-record { margin-top:7px; color:var(--text-2); font-family:var(--font-mono); font-size:.6875rem; }
  .podium-base { min-height:62px; display:flex; align-items:center; justify-content:center; gap:9px;
    padding:12px; background:color-mix(in srgb, var(--medal) 7%, var(--surface-2));
    border:1px solid var(--border); border-top-color:var(--border-2); border-bottom:3px solid var(--medal); }
  .place-1 .podium-base { min-height:78px; }
  .podium-base span { color:var(--text-2); font-size:.6875rem; text-transform:uppercase; }
  .podium-base strong { color:var(--medal); font-family:var(--font-mono); font-size:1.125rem; font-variant-numeric:tabular-nums; }
  .place-1 .podium-base strong { font-size:1.375rem; }

  .standings-head { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:20px 24px 12px; }
  .standings-head h3 { margin:0; font-family:var(--font-display); letter-spacing:0; }
  .standings-count { color:var(--text-2); font-family:var(--font-mono); font-size:.75rem; }
  .board-table { margin:0 24px 24px; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .board-columns, #board li { display:grid; grid-template-columns:58px minmax(150px,1.4fr) 110px minmax(140px,1fr) 92px;
    align-items:center; column-gap:14px; }
  .board-columns { min-height:38px; padding:0 14px; background:var(--surface-2); color:var(--text-2);
    font-size:.6875rem; font-weight:600; text-transform:uppercase; border-bottom:1px solid var(--border); }
  .board-columns span:last-child { text-align:right; }
  #board { list-style:none; margin:0; padding:0; }
  #board li { min-height:58px; padding:9px 14px; border-bottom:1px solid var(--border); }
  #board li:last-child { border-bottom:0; }
  #board li:hover { background:var(--gold-faint); }
  .board-rank { color:var(--text-3); font-family:var(--font-mono); font-size:.75rem; font-variant-numeric:tabular-nums; }
  #board li:nth-child(-n+3) .board-rank { color:var(--gold); }
  .board-player { min-width:0; display:flex; align-items:center; gap:10px; }
  .board-avatar { flex:none; width:32px; height:32px; display:grid; place-items:center; border-radius:50%;
    color:var(--tier); background:var(--surface-2); border:1px solid color-mix(in srgb, var(--tier) 45%, var(--border));
    font-family:var(--font-display); font-size:.8125rem; font-weight:700; }
  .board-name { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; }
  .board-record { color:var(--text-2); font-family:var(--font-mono); font-size:.75rem; }
  .board-tier { min-width:0; display:flex; align-items:center; gap:7px; color:var(--tier); font-size:.75rem; font-weight:600; }
  .board-tier::before { content:""; flex:none; width:7px; height:7px; background:var(--tier); }
  .board-tier span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .board-rating { text-align:right; color:var(--text); font-family:var(--font-mono); font-size:.875rem; font-variant-numeric:tabular-nums; }
  .board-empty { display:block !important; padding:24px !important; color:var(--text-2); text-align:center; }
  .podium > .board-empty { grid-column:1 / -1; }

  @media (max-width:720px) {
    .leaderboard-head { align-items:flex-start; }
    .board-columns, #board li { grid-template-columns:50px minmax(120px,1fr) 92px 80px; }
    .board-columns .col-tier, .board-tier { display:none; }
  }
  @media (max-width:560px) {
    .ranked-page { padding-inline:16px; }
    .page-head { align-items:flex-start; }
    .leaderboard-head { padding:18px 16px 15px; }
    .leaderboard-head p { display:none; }
    .leaderboard-head { flex-direction:column; gap:14px; }
    .board-scope { width:100%; align-items:stretch; }
    .scope-toggle { justify-content:center; }
    .scope-message { max-width:none; text-align:left; }
    .podium { padding:16px; grid-template-columns:1fr; grid-template-areas:"first" "second" "third"; }
    .podium-player, .place-1 .podium-player, .place-2 .podium-player { min-height:0; padding:42px 14px 14px; }
    .podium-monogram, .place-1 .podium-monogram { width:50px; height:50px; font-size:1.25rem; }
    .podium-name, .place-1 .podium-name { font-size:1.0625rem; }
    .podium-base, .place-1 .podium-base { min-height:54px; border-bottom-width:1px; }
    .standings-head { padding:18px 16px 10px; }
    .board-table { margin:0 16px 16px; }
    .board-columns, #board li { grid-template-columns:44px minmax(0,1fr) 74px; column-gap:8px; padding-inline:10px; }
    .board-columns .col-record, .board-record, .board-columns .col-tier, .board-tier { display:none; }
    .board-avatar { width:28px; height:28px; }
  }

  .modal { position:fixed; inset:0; background:var(--scrim); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
  .modal.hidden { display:none; }
  .modal .box { border-radius:var(--r-lg); padding:22px; max-width:560px; width:100%; }
  .modal h3 { margin:0 0 16px; }
  .modal .close { float:right; cursor:pointer; border:0; background:0; font-size:18px; color:var(--text-2); }
  .modal .close:hover { color:var(--text); }
  /* Tier cards (.ladder / .badge-tier from base.css) — force 2 columns inside the narrow modal. */
  .modal .ladder { grid-template-columns:repeat(2, 1fr); }
  .modal .ladder-caption { font-size:13px; }
</style>
</head>
<body>
<header id="site-nav"></header>
<main class="page ranked-page">
  <div class="page-head">
    <h1>Ranked</h1>
    <a class="btn gold" href="/play">Jump back in</a>
  </div>
  <div class="toggle">
    <button id="tabRank" class="seg active">Your rank</button>
    <button id="tabBoard" class="seg">Leaderboard</button>
  </div>

  <section id="viewRank">
    <div id="rankBox" class="panel">loading…</div>
    <h3 class="sec-label">Recent matches</h3>
    <div id="history" class="muted">loading…</div>
  </section>

  <section id="viewBoard" hidden>
    <div class="leaderboard panel">
      <div class="leaderboard-head">
        <div>
          <h2 id="leaderboardTitle">Global standings</h2>
          <p id="leaderboardSubtitle">The highest-rated players on the omegLOL stage.</p>
        </div>
        <div class="board-scope">
          <button class="scope-toggle" id="friendScope" type="button" role="switch" aria-checked="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Friends leaderboard</span>
            <span class="scope-switch" aria-hidden="true"></span>
          </button>
          <span class="scope-message" id="scopeMessage" role="status" aria-live="polite"></span>
        </div>
      </div>
      <ol class="podium" id="podium" aria-label="Top three players"><li class="board-empty">loading…</li></ol>
      <div class="standings-head">
        <h3>Full standings</h3>
        <span class="standings-count" id="boardCount">Top 10</span>
      </div>
      <div class="board-table">
        <div class="board-columns" aria-hidden="true">
          <span>Rank</span><span>Player</span><span class="col-record">Record</span><span class="col-tier">Tier</span><span>Rating</span>
        </div>
        <ol id="board"><li class="board-empty">loading…</li></ol>
      </div>
    </div>
  </section>
</main>

<div id="infoModal" class="modal hidden">
  <div class="box panel">
    <button class="close" id="infoClose" aria-label="close">×</button>
    <ol class="ladder" id="tierList"></ol>
  </div>
</div>

<script type="module">
import { TIERS, rankFor, rankRange } from "/js/ranks.mjs";
const $ = id => document.getElementById(id);
const token = localStorage.getItem("lastlaugh_token");
let globalRows = [], boardMode = "global";
// Escape user-authored strings (screennames) before they touch innerHTML — output-encoding XSS defense.
const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function switchView(v) {
  $("viewRank").hidden = v !== "rank"; $("viewBoard").hidden = v !== "board";
  $("tabRank").classList.toggle("active", v === "rank");
  $("tabBoard").classList.toggle("active", v === "board");
}
$("tabRank").onclick = () => switchView("rank");
$("tabBoard").onclick = () => switchView("board");

// Same tier-card UI as the old homepage ladder, generated from TIERS so it can't drift.
const ROMAN = ["VI", "V", "IV", "III", "II", "I"];
$("tierList").innerHTML = TIERS.map((t, i) =>
  `<li style="--c:${t.color}"><span class="badge-tier">${ROMAN[i]}</span><span class="t-name">${t.name}</span><span class="t-range">${rankRange(i)}</span></li>`).join("");
function openInfo() { $("infoModal").classList.remove("hidden"); }
function closeInfo() { $("infoModal").classList.add("hidden"); }
$("infoClose").onclick = closeInfo;
$("infoModal").addEventListener("click", e => { if (e.target === $("infoModal")) closeInfo(); });

function notRanked() {
  $("rankBox").innerHTML = `
    <div class="rankhead">
      <p class="muted" style="margin:0">Play a ranked game to earn a rank. <a href="/play">Take the stage →</a></p>
      <button class="info" id="infoBtn" title="rank info" aria-label="rank info">i</button>
    </div>`;
  $("infoBtn").onclick = openInfo;
  $("history").textContent = "";
}
function renderRank(p) {
  const t = rankFor(p.rating);
  $("rankBox").innerHTML = `
    <div class="rankhead">
      <div>
        <div class="rankname" style="color:${t.color}">${t.name}</div>
        <div class="muted">${p.rating} Elo · ${p.wins}W ${p.losses}L ${p.draws}D</div>
      </div>
      <button class="info" id="infoBtn" title="rank info" aria-label="rank info">i</button>
    </div>`;
  $("infoBtn").onclick = openInfo;
}
function renderHistory(matches) {
  if (!matches.length) { $("history").textContent = "no matches yet — play a ranked game."; return; }
  $("history").innerHTML = "";
  for (const m of matches) {
    const sign = m.delta >= 0 ? "+" : "";
    const letter = m.outcome === "win" ? "W" : m.outcome === "lose" ? "L" : "D";
    const row = document.createElement("div");
    row.className = "match";
    row.innerHTML =
      `<span class="res ${m.outcome}">${letter}</span>
       <span class="opp">vs ${esc(m.opponent)}</span>
       <span class="elo">${m.before} → ${m.after} <b class="${m.delta >= 0 ? "up" : "down"}">${sign}${m.delta}</b></span>`;
    $("history").appendChild(row);
  }
}

function renderBoard(rows) {
  const podium = $("podium"), board = $("board");
  if (!rows.length) {
    podium.innerHTML = "";
    board.innerHTML = '<li class="board-empty">no games played yet</li>';
    $("boardCount").textContent = "No entries";
    return;
  }
  $("boardCount").textContent = `Top ${rows.length}`;
  podium.innerHTML = rows.slice(0, 3).map((r, i) => {
    const t = rankFor(r.rating), place = i + 1;
    const initial = esc(String(r.name || "?").trim().charAt(0).toUpperCase() || "?");
    return `<li class="podium-entry place-${place}" style="--tier:${t.color}">
      <div class="podium-player">
        <span class="podium-rank" aria-label="Rank ${place}">#${String(place).padStart(2, "0")}</span>
        <span class="podium-monogram" aria-hidden="true">${initial}</span>
        <strong class="podium-name">${esc(r.name)}</strong>${r.self ? '<span class="you-tag">You</span>' : ""}
        <span class="podium-tier">${esc(t.name)}</span>
        <span class="podium-record">${Number(r.wins) || 0}W · ${Number(r.losses) || 0}L</span>
      </div>
      <div class="podium-base"><span>Rating</span><strong>${Number(r.rating) || 0}</strong></div>
    </li>`;
  }).join("");
  board.innerHTML = "";
  rows.forEach((r, i) => {
    const t = rankFor(r.rating);
    const initial = esc(String(r.name || "?").trim().charAt(0).toUpperCase() || "?");
    const li = document.createElement("li");
    li.style.setProperty("--tier", t.color);
    li.innerHTML =
      `<span class="board-rank">#${String(i + 1).padStart(2, "0")}</span>
       <span class="board-player"><span class="board-avatar" aria-hidden="true">${initial}</span><span class="board-name">${esc(r.name)}</span>${r.self ? '<span class="you-tag">You</span>' : ""}</span>
       <span class="board-record">${Number(r.wins) || 0}W · ${Number(r.losses) || 0}L</span>
       <span class="board-tier"><span>${esc(t.name)}</span></span>
       <span class="board-rating">${Number(r.rating) || 0}</span>`;
    board.appendChild(li);
  });
}

function showBoardMode(mode, rows) {
  boardMode = mode;
  const friends = mode === "friends";
  $("friendScope").setAttribute("aria-checked", String(friends));
  $("leaderboardTitle").textContent = friends ? "Friends standings" : "Global standings";
  $("leaderboardSubtitle").textContent = friends
    ? "Your place among the people you play with."
    : "The highest-rated players on the omegLOL stage.";
  renderBoard(rows);
}

$("friendScope").addEventListener("click", async () => {
  const button = $("friendScope"), message = $("scopeMessage");
  message.textContent = "";
  if (boardMode === "friends") { showBoardMode("global", globalRows); return; }
  button.disabled = true;
  try {
    const headers = token ? { "x-token": token } : {};
    const response = await fetch("/api/leaderboard/friends", { headers, credentials: "same-origin" });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      if (data.error === "need_more_friends") {
        const remaining = Math.max(1, (Number(data.required) || 4) - (Number(data.friendCount) || 0));
        message.textContent = `Add ${remaining} more ${remaining === 1 ? "friend" : "friends"} to unlock this leaderboard.`;
      } else if (response.status === 401) {
        message.textContent = "Sign in to use the friends leaderboard.";
      } else {
        message.textContent = "Friends standings are unavailable right now.";
      }
      return;
    }
    showBoardMode("friends", Array.isArray(data.rows) ? data.rows : []);
  } catch {
    message.textContent = "Friends standings are unavailable right now.";
  } finally {
    button.disabled = false;
  }
});

(async () => {
  try {
    const response = await fetch("/api/leaderboard");
    if (!response.ok) throw new Error("leaderboard unavailable");
    const rows = await response.json();
    globalRows = Array.isArray(rows) ? rows : [];
    showBoardMode("global", globalRows);
  }
  catch {
    $("podium").innerHTML = "";
    $("board").innerHTML = '<li class="board-empty">leaderboard unavailable</li>';
    $("boardCount").textContent = "Offline";
  }

  if (!token) { notRanked(); return; }
  try {
    const r = await fetch("/api/me", { headers: { "x-token": token } });
    if (!r.ok) { notRanked(); return; }
    const { profile, matches } = await r.json();
    renderRank(profile); renderHistory(matches);
  } catch { notRanked(); }
})();
</script>
<script src="/js/nav.js"></script>
</body>
</html>
