<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>omegLOL — ranked</title>
<link rel="stylesheet" href="/css/base.css" />
</head>
<body>
<header id="site-nav"></header>
<main class="page">
  <h1>Ranked</h1>
  <p class="muted">Win duels, climb the ladder.</p>

  <div class="panel" style="margin:18px 0">
    <h3>Your rank</h3>
    <p class="muted">Sign in and play to earn a rank. <em>(Rank tiers TBD.)</em></p>
  </div>

  <div class="panel" style="margin:18px 0">
    <h3>Rank tiers</h3>
    <p class="muted">Coming soon — a tiered ladder (Bronze → Diamond, placeholder).</p>
  </div>

  <div class="panel">
    <h3>Global leaderboard</h3>
    <ol id="board" class="muted" style="padding-left:22px"><li>loading…</li></ol>
  </div>
</main>
<script>
  // Leaderboard is real data, fetched over plain HTTP (not the game socket).
  fetch("/api/leaderboard").then(r => r.json()).then(rows => {
    const ol = document.getElementById("board");
    if (!rows.length) { ol.innerHTML = "<li>no games played yet</li>"; return; }
    ol.innerHTML = "";
    for (const r of rows) {
      const li = document.createElement("li");
      li.style.cssText = "display:flex; justify-content:space-between; padding:2px 0";
      li.innerHTML = `<span style="color:var(--ink)">${r.name}</span><span style="color:var(--accent)">${r.rating}</span>`;
      ol.appendChild(li);
    }
  }).catch(() => { document.getElementById("board").innerHTML = "<li>leaderboard unavailable</li>"; });
</script>
<script src="/js/nav.js"></script>
</body>
</html>
