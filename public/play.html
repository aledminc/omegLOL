<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>omegLOL — play</title>
<link rel="stylesheet" href="/css/base.css" />
<style>
  /* page-specific styles; body flow is normal so the shared nav sits on top */
  .app { width:100%; max-width:560px; margin:18px auto; padding:0 14px; }
  .profile { display:flex; justify-content:space-between; align-items:baseline; gap:10px; padding:8px 2px 12px; font-size:14px; }
  .profile .name { font-weight:600; }
  .profile .rating { color:#5dcaa5; font-variant-numeric:tabular-nums; }
  .profile .record { color:#9c9a92; font-size:13px; }
  .status { font-size:13px; color:#9c9a92; padding:0 2px 10px; }
  .stage { position:relative; aspect-ratio:4/3; background:#000; border-radius:14px; overflow:hidden; border:1px solid #2a2a28; }
  #remote { width:100%; height:100%; object-fit:cover; }
  #local { position:absolute; bottom:12px; right:12px; width:30%; max-width:150px; aspect-ratio:4/3;
    object-fit:cover; transform:scaleX(-1); border-radius:8px; border:1px solid #3a3a37; background:#1d1d1b; }
  .banner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; pointer-events:none; background:rgba(0,0,0,.35); }
  .banner.hidden { display:none; }
  .banner .big { font-size:30px; font-weight:600; }
  .banner .count { font-size:64px; font-weight:600; line-height:1; }
  .banner .sub { font-size:14px; color:#cfcdc5; margin-top:4px; }
  .banner .delta { font-size:22px; font-weight:600; margin-top:8px; }
  .scorebar { display:flex; gap:10px; margin-top:12px; align-items:center; }
  .side { flex:1; }
  .side .lab { display:flex; justify-content:space-between; font-size:13px; color:#c2c0b6; margin-bottom:4px; }
  .track { height:12px; background:#2a2a28; border-radius:6px; overflow:hidden; }
  .fill { height:100%; width:0%; border-radius:6px; transition:width 200ms ease; }
  .fill.you { background:#5dcaa5; } .fill.them { background:#ef9f27; }
  .gamebar { display:flex; gap:8px; margin-top:12px; }
  .gamebar button { padding:11px 16px; font:inherit; font-weight:500; border:0; border-radius:8px; cursor:pointer; background:#e9e7e0; color:#141414; }
  .gamebar button.ghost { background:#2a2a28; color:#e9e7e0; }
  .gamebar button:disabled { opacity:.45; cursor:default; }
  .board { margin-top:18px; }
  .board h3 { font-size:13px; color:#9c9a92; font-weight:500; margin:0 0 6px; text-transform:uppercase; letter-spacing:.06em; }
  .board ol { margin:0; padding-left:22px; font-size:14px; }
  .board li { display:flex; justify-content:space-between; gap:10px; padding:2px 0; }
  .board .r { color:#5dcaa5; font-variant-numeric:tabular-nums; }
  .gate { position:fixed; inset:0; background:#141414; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px; padding:24px; }
  .gate.hidden { display:none; }
  .gate h1 { font-size:22px; margin:0; }
  .gate input { padding:11px 14px; font:inherit; background:#1d1d1b; color:#e9e7e0; border:1px solid #2a2a28; border-radius:8px; width:240px; }
  .gate button { padding:11px 20px; font:inherit; font-weight:600; border:0; border-radius:8px; cursor:pointer; background:#f4b740; color:#241803; }
</style>
</head>
<body data-phase="idle" data-role="">
<div class="gate" id="nameGate">
  <h1>Pick a stage name</h1>
  <input id="nameInput" placeholder="stage name" maxlength="24" />
  <button id="nameBtn">Enter the club</button>
</div>

<header id="site-nav"></header>

<div class="app">
  <div class="profile">
    <span class="name" id="profName">—</span>
    <span><span class="rating" id="profRating">—</span> <span class="record" id="profRecord"></span></span>
  </div>
  <div class="status" id="status">connecting…</div>

  <div class="stage">
    <video id="remote" autoplay playsinline></video>
    <video id="local" autoplay playsinline muted></video>
    <div class="banner hidden" id="banner">
      <div class="big" id="bannerBig"></div>
      <div class="count" id="bannerCount"></div>
      <div class="sub" id="bannerSub"></div>
      <div class="delta" id="bannerDelta"></div>
    </div>
  </div>

  <div class="scorebar">
    <div class="side"><div class="lab"><span>you</span><span id="youNum">0</span></div><div class="track"><div class="fill you" id="youBar"></div></div></div>
    <div class="side"><div class="lab"><span>them</span><span id="themNum">0</span></div><div class="track"><div class="fill them" id="themBar"></div></div></div>
  </div>

  <div class="gamebar">
    <button id="find" disabled>Find a match</button>
    <button id="next" class="ghost" disabled>Next</button>
  </div>

  <div class="board"><h3>Leaderboard</h3><ol id="board"></ol></div>
</div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12";

const $ = id => document.getElementById(id);
const statusEl = $("status"), banner = $("banner"), localVideo = $("local"), remoteVideo = $("remote");
const TOKEN_KEY = "lastlaugh_token";

const SMILE_FLOOR = 0.30, JAW_FLOOR = 0.25, LAUGH_GAIN = 3.0, RATE = 10.0;
const ICE = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

// connect to the SAME host that served this page (http page -> ws, https page -> wss)
const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host);
let pc = null, localStream = null, remoteSet = false, pendingCandidates = [];
let detector = null;

function signal(m) { ws.send(JSON.stringify(m)); }
function setStatus(s) { statusEl.textContent = s; }
function setBodyState(phase, role) { document.body.dataset.phase = phase || ""; document.body.dataset.role = role || ""; }

function authenticate() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (token) signal({ type: "auth", token });
  else $("nameGate").classList.remove("hidden");
}
$("nameBtn").addEventListener("click", () => signal({ type: "auth", name: $("nameInput").value.trim() || "Anon" }));
function applyProfile(p) { $("profName").textContent = p.name; $("profRating").textContent = p.rating; $("profRecord").textContent = `${p.wins}W ${p.losses}L`; }
function renderBoard(top) {
  $("board").innerHTML = "";
  for (const row of top) { const li = document.createElement("li"); li.innerHTML = `<span>${row.name}</span><span class="r">${row.rating}</span>`; $("board").appendChild(li); }
}

async function ensureCamera() {
  if (localStream) return;
  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  localVideo.srcObject = localStream;
}
function startCall(isInitiator) {
  pc = new RTCPeerConnection(ICE); remoteSet = false; pendingCandidates = [];
  for (const t of localStream.getTracks()) pc.addTrack(t, localStream);
  pc.ontrack = e => { remoteVideo.srcObject = e.streams[0]; };
  pc.onicecandidate = e => { if (e.candidate) signal({ type: "candidate", candidate: e.candidate }); };
  if (isInitiator) pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => signal({ type: "offer", sdp: pc.localDescription }));
}
async function flushCandidates() { for (const c of pendingCandidates) { try { await pc.addIceCandidate(c); } catch {} } pendingCandidates = []; }
function endCall() { if (pc) { pc.close(); pc = null; } remoteVideo.srcObject = null; remoteSet = false; pendingCandidates = []; }

async function ensureDetector() {
  if (detector) return;
  const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm");
  detector = await FaceLandmarker.createFromOptions(fileset, {
    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
    outputFaceBlendshapes: true, runningMode: "VIDEO", numFaces: 1,
  });
}
let scoring = false, scoreAccum = 0, lastDetectMs = 0, lastVideoTime = -1, lastFlushMs = 0;
function startScoring() { if (scoring) return; scoring = true; scoreAccum = 0; lastDetectMs = performance.now(); lastFlushMs = performance.now(); requestAnimationFrame(scoreLoop); }
function stopScoring() { if (scoring) { scoring = false; flushScore(); } }
function flushScore() { if (scoreAccum > 0) { signal({ type: "score", delta: scoreAccum }); scoreAccum = 0; } }
function scoreLoop() {
  if (!scoring) return;
  const now = performance.now();
  if (detector && localVideo.currentTime !== lastVideoTime) {
    lastVideoTime = localVideo.currentTime;
    const res = detector.detectForVideo(localVideo, now);
    const shapes = res.faceBlendshapes;
    if (shapes && shapes.length) {
      const m = {}; for (const c of shapes[0].categories) m[c.categoryName] = c.score;
      const smile = ((m.mouthSmileLeft || 0) + (m.mouthSmileRight || 0)) / 2;
      const jaw = m.jawOpen || 0;
      const above = Math.max(0, smile - SMILE_FLOOR);
      const amusement = above * (1 + LAUGH_GAIN * Math.max(0, jaw - JAW_FLOOR));
      const dt = Math.min(0.1, (now - lastDetectMs) / 1000);
      scoreAccum += amusement * dt * RATE;
    }
    lastDetectMs = now;
  }
  if (now - lastFlushMs > 1000) { flushScore(); lastFlushMs = now; }
  requestAnimationFrame(scoreLoop);
}

function showBanner(big, count, sub) {
  banner.classList.remove("hidden");
  $("bannerBig").textContent = big || ""; $("bannerCount").textContent = count != null ? count : "";
  $("bannerSub").textContent = sub || ""; $("bannerDelta").textContent = "";
}
function hideBanner() { banner.classList.add("hidden"); }
function setScores(s) {
  $("youNum").textContent = Math.round(s.you); $("themNum").textContent = Math.round(s.them);
  const max = Math.max(10, s.you, s.them);
  $("youBar").style.width = (s.you / max * 100) + "%"; $("themBar").style.width = (s.them / max * 100) + "%";
}
let countdownTimer = null;
function localCountdown(from, label, sub) {
  clearInterval(countdownTimer);
  let n = Math.ceil(from); showBanner(label, n, sub);
  countdownTimer = setInterval(() => { n -= 1; if (n <= 0) { clearInterval(countdownTimer); return; } $("bannerCount").textContent = n; }, 1000);
}
function applyGameState(msg) {
  if (msg.scores) setScores(msg.scores);
  setBodyState(msg.phase, msg.role);
  const inRound = msg.phase === "round1" || msg.phase === "round2";
  if (inRound && msg.role === "watcher") ensureDetector().then(startScoring); else stopScoring();
  switch (msg.phase) {
    case "countdown": localCountdown(msg.seconds, "Get ready", msg.role === "performer" ? "you're up first" : "you watch first"); break;
    case "round1": case "round2":
      clearInterval(countdownTimer);
      if (msg.role === "performer") showBanner("You're on", "", "be funny — make them crack");
      else showBanner("Don't laugh", "", "every smile feeds their score");
      setTimeout(hideBanner, 1400); break;
    case "swap": localCountdown(msg.seconds, "Swap!", "roles flip"); break;
    case "result": {
      clearInterval(countdownTimer);
      const word = msg.outcome === "win" ? "You win" : msg.outcome === "lose" ? "You lose" : "Draw";
      showBanner(word, "", `${Math.round(msg.scores.you)} – ${Math.round(msg.scores.them)}`); break;
    }
  }
}

ws.addEventListener("open", () => { setStatus("connecting…"); authenticate(); });
ws.addEventListener("close", () => { setStatus("disconnected"); endCall(); stopScoring(); setBodyState("idle", ""); });
ws.addEventListener("message", async (e) => {
  const msg = JSON.parse(e.data);
  switch (msg.type) {
    case "authed":
      localStorage.setItem(TOKEN_KEY, msg.token);
      $("nameGate").classList.add("hidden"); applyProfile(msg.profile);
      setStatus("ready — find a match"); $("find").disabled = false; signal({ type: "leaderboard" }); break;
    case "leaderboard": renderBoard(msg.top); break;
    case "waiting": setStatus("searching…"); setBodyState("searching", ""); break;
    case "matched":
      await ensureCamera(); ensureDetector(); startCall(msg.initiator);
      setStatus("opponent found"); setBodyState("matched", ""); $("find").disabled = true; $("next").disabled = false; break;
    case "offer":
      if (!pc) startCall(false);
      await pc.setRemoteDescription(msg.sdp); remoteSet = true; await flushCandidates();
      await pc.setLocalDescription(await pc.createAnswer()); signal({ type: "answer", sdp: pc.localDescription }); break;
    case "answer":
      await pc.setRemoteDescription(msg.sdp); remoteSet = true; await flushCandidates(); break;
    case "candidate":
      if (remoteSet) { try { await pc.addIceCandidate(msg.candidate); } catch {} } else pendingCandidates.push(msg.candidate); break;
    case "gameState": applyGameState(msg); break;
    case "score": setScores(msg.scores); break;
    case "ranked":
      $("bannerDelta").textContent = (msg.delta >= 0 ? "+" : "") + msg.delta + "  →  " + msg.rating;
      $("profRating").textContent = msg.rating; signal({ type: "leaderboard" }); break;
    case "gameReset":
      stopScoring(); endCall(); hideBanner(); setBodyState("idle", "");
      setStatus("game over — find another"); setScores({ you: 0, them: 0 });
      $("find").disabled = false; $("next").disabled = true; break;
    case "partnerLeft":
      stopScoring(); endCall(); hideBanner(); setBodyState("idle", "");
      setStatus("opponent left — find another"); setScores({ you: 0, them: 0 });
      $("find").disabled = false; $("next").disabled = true; break;
  }
});

$("find").addEventListener("click", async () => {
  try { await ensureCamera(); } catch (err) { setStatus("camera blocked: " + err.message); return; }
  signal({ type: "find" }); $("find").disabled = true; setStatus("searching…");
});
$("next").addEventListener("click", () => {
  stopScoring(); endCall(); hideBanner(); signal({ type: "next" });
  setScores({ you: 0, them: 0 }); $("find").disabled = true; setStatus("searching…");
});
</script>
</body>
</html>
